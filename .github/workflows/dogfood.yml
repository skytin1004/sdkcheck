name: Internal dogfood

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  internal-dogfood:
    name: Internal dogfood audit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Run internal dogfood
        if: ${{ secrets.SDKCHECK_AGENT_API_KEY != '' && vars.SDKCHECK_AGENT_MODEL != '' }}
        env:
          SDKCHECK_AGENT_API_KEY: ${{ secrets.SDKCHECK_AGENT_API_KEY }}
          SDKCHECK_AGENT_MODEL: ${{ vars.SDKCHECK_AGENT_MODEL }}
        run: cargo run --locked -- run --docs README.md --workspace . --goal "Install sdkcheck from this checkout and print the CLI help." --success "sdkcheck help exits successfully." --backend local --output reports/dogfood-local.md --json-output reports/dogfood-local.json

      - name: Skip without model credentials
        if: ${{ secrets.SDKCHECK_AGENT_API_KEY == '' || vars.SDKCHECK_AGENT_MODEL == '' }}
        run: echo "Skipping dogfood audit because SDKCHECK_AGENT_API_KEY or SDKCHECK_AGENT_MODEL is not configured."

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dogfood-report
          path: |
            reports/dogfood-local.md
            reports/dogfood-local.json
          if-no-files-found: ignore
